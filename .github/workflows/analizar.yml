name: Analizar acciones

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar ejecucion aunque el mercado este cerrado"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/analizar.yml"
      - "analizador_acciones.py"

permissions:
  contents: write

concurrency:
  group: arq-v2-auto-update
  cancel-in-progress: false

jobs:
  analizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ARQ_PAT }}
          persist-credentials: true

      - name: Mostrar tipo de ejecucion
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Force: ${{ inputs.force }}"
          echo "Rama: ${{ github.ref }}"
          echo "Fecha UTC:"
          date -u
          echo "Fecha Colombia:"
          TZ=America/Bogota date
          echo "Fecha New York:"
          TZ=America/New_York date

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl yfinance requests pandas_market_calendars

      - name: Verificar mercado abierto NYSE
        id: mercado
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import pandas_market_calendars as mcal

          now = datetime.now(ZoneInfo("America/New_York"))
          cal = mcal.get_calendar("NYSE")
          sched = cal.schedule(start_date=now.date(), end_date=now.date())

          is_open = False

          if sched.empty:
              print(f"Mercado cerrado hoy. Ahora NY: {now:%Y-%m-%d %H:%M:%S %Z}")
          else:
              market_open = sched.iloc[0]["market_open"].tz_convert("America/New_York").to_pydatetime()
              market_close = sched.iloc[0]["market_close"].tz_convert("America/New_York").to_pydatetime()

              is_open = market_open <= now <= market_close

              print(f"Ahora NY: {now:%Y-%m-%d %H:%M:%S %Z}")
              print(f"Apertura NYSE: {market_open:%Y-%m-%d %H:%M:%S %Z}")
              print(f"Cierre NYSE: {market_close:%Y-%m-%d %H:%M:%S %Z}")
              print(f"Mercado abierto: {is_open}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_open={'true' if is_open else 'false'}\n")
          PY

      - name: Mercado cerrado - no ejecutar analisis
        if: steps.mercado.outputs.is_open != 'true' && inputs.force != 'true'
        run: |
          echo "Mercado cerrado. No se actualizan los archivos."

      - name: Ejecutar analizador
        if: steps.mercado.outputs.is_open == 'true' || inputs.force == 'true'
        run: python analizador_acciones.py

      - name: Guardar resultados en el repositorio
        if: steps.mercado.outputs.is_open == 'true' || inputs.force == 'true'
        run: |
          git config user.name "davascoj"
          git config user.email "stivenvasco223@gmail.com"

          git add datos_acciones.json analisis_acciones.xlsx historial_senales.json historial_senales.xlsx

          if git diff --cached --quiet; then
            echo "Sin cambios para guardar"
          else
            git commit -m "Actualizar analisis automatico ARQ v2"
            git push origin main
          fi
