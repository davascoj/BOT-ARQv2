name: Analizar acciones

on:
  workflow_dispatch:
  schedule:
    # Cada 5 minutos, lunes a viernes, de 8:00 a.m. a 4:59 p.m. hora Colombia aprox.
    # GitHub usa hora UTC. Esto cubre el horario normal del mercado de EE. UU. con margen.
    - cron: "*/5 13-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: arq-analisis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analizar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl yfinance

      - name: Ejecutar analizador
        run: python analizador_acciones.py

      - name: Guardar resultados en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add datos_acciones.json analisis_acciones.xlsx historial_senales.json historial_senales.xlsx
          if git diff --cached --quiet; then
            echo "Sin cambios para guardar"
          else
            git commit -m "Actualizar analisis automatico 5min"
            git push
          fi
